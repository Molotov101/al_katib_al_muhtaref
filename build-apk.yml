name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Unzip project (if uploaded as a zip)
        run: |
          ZIPFILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIPFILE" ]; then
            echo "Found $ZIPFILE, extracting..."
            unzip -o "$ZIPFILE" -d _extracted
            PROJDIR=$(find _extracted -maxdepth 1 -mindepth 1 -type d | head -n 1)
            shopt -s dotglob
            cp -r "$PROJDIR"/* .
            rm -rf _extracted "$ZIPFILE"
          fi

      - name: Remove broken android/ios folders (force clean regeneration)
        run: rm -rf android ios

      - name: Generate missing platform files (android/ios)
        run: flutter create . --platforms=android,ios --org com.alkatib.almuhtaref

      - name: Fix kotlin_version placeholder
        run: |
          if [ -f android/build.gradle ]; then
            sed -i "s/ext.kotlin_version = '<latest-version>'/ext.kotlin_version = '1.9.10'/" android/build.gradle
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
